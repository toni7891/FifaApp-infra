apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: fifaapp
data:
  default.conf: |
    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        location /api {
            proxy_pass http://fifaapp-backend-svc.fifaapp.svc.cluster.local:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
